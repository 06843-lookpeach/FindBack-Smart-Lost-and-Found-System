<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Found Items | FindBack</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand d-flex align-items-center" href="index.html">

<img src="assets/images/school-logo.png"
class="logo">

<div class="ms-3">

<h5 class="text-white m-0">

FindBack

</h5>

<small class="text-light">

Smart Lost & Found System

</small>

</div>

</a>

</div>

</nav>

<section class="container py-5">

<h2 class="fw-bold mb-4">

Found Items

</h2>

<div class="search-box mb-5">

<input

id="search"

type="text"

placeholder="ค้นหาสิ่งของ...">

<button>

<i class="bi bi-search"></i>

</button>

</div>

<div class="row"
id="itemContainer">

</div>

</section>
<div class="modal" id="returnModal">

<div class="modal-content">

<h4>ขอรับคืนสิ่งของ</h4>

<input id="requester"
class="form-control mb-2"
placeholder="ชื่อผู้ขอรับคืน">


<input id="returnContact"
class="form-control mb-2"
placeholder="ช่องทางติดต่อ">


<button onclick="sendReturnRequest()"
class="btn btn-success">

ส่งคำขอ

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
